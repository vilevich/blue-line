name: Deploy BL Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @opswat/bl-docs build
        env:
          BASE_URL: /blue-line/

      - run: pnpm --filter @opswat/mdss build
        env:
          BASE_URL: /blue-line/mdss/

      - name: Merge dist folders
        run: |
          mkdir -p _site
          cp -r apps/bl-docs/dist/* _site/
          mkdir -p _site/mdss
          cp -r apps/mdss/dist/* _site/mdss/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
